<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ValoriaIntel">
<meta name="theme-color" content="#c8a96e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>ValoriaIntel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #131313;
  --surface2: #1c1c1c;
  --border: #252525;
  --accent: #c8a96e;
  --accent2: #e8c97e;
  --text: #e8e4dc;
  --muted: #5a5a5a;
  --danger: #c0392b;
  --success: #2ecc71;
  --warning: #e67e22;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
}

/* LAYOUT */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* HEADER */
header {
  background: rgba(10,10,10,0.98);
  backdrop-filter: blur(20px);
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 17px;
  letter-spacing: 0.12em;
  color: var(--accent);
}

.logo span { color: var(--text); }

.header-pills {
  display: flex;
  gap: 8px;
}

.pill {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--muted);
}

.pill span { color: var(--accent); font-weight: 500; }

.search-bar {
  position: relative;
}

.search-bar input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: 10px 14px 10px 38px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  outline: none;
  -webkit-appearance: none;
}

.search-bar input:focus { border-color: var(--accent); }
.search-bar input::placeholder { color: var(--muted); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 15px;
  pointer-events: none;
}

/* FILTER ROW */
.filter-row {
  display: flex;
  gap: 8px;
  padding: 10px 20px;
  overflow-x: auto;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}

.filter-row::-webkit-scrollbar { display: none; }

.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--muted);
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-appearance: none;
  font-family: 'DM Mono', monospace;
}

.chip.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  font-weight: 500;
}

/* LIST */
#list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.factory-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color 0.15s;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.factory-card:active { border-color: var(--accent); background: var(--surface2); }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
}

.card-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
  line-height: 1.2;
  flex: 1;
  padding-right: 10px;
}

.card-trust {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 4px;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.card-city {
  font-size: 11px;
  color: var(--muted);
}

.card-niche {
  background: rgba(200,169,110,0.1);
  color: var(--accent);
  border: 1px solid rgba(200,169,110,0.2);
  border-radius: 4px;
  padding: 2px 7px;
  font-size: 10px;
  letter-spacing: 0.05em;
}

.card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.card-stats {
  display: flex;
  gap: 16px;
}

.card-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-label { font-size: 9px; letter-spacing: 0.08em; color: var(--muted); }
.stat-val { font-size: 12px; color: var(--text); }

.card-stars { color: var(--accent); font-size: 12px; letter-spacing: 1px; }

/* EMPTY */
.empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 40px 20px;
  color: var(--muted);
  text-align: center;
}

.empty-icon { font-size: 48px; }
.empty-text { font-size: 13px; line-height: 1.7; }

/* FAB */
#fab {
  position: fixed;
  bottom: calc(24px + var(--safe-bottom));
  right: 24px;
  width: 56px;
  height: 56px;
  background: var(--accent);
  border-radius: 50%;
  border: none;
  color: #000;
  font-size: 26px;
  font-weight: 300;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 24px rgba(200,169,110,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
  z-index: 50;
  line-height: 1;
}

#fab:active { transform: scale(0.93); box-shadow: 0 2px 12px rgba(200,169,110,0.3); }

/* BOTTOM SHEET */
.sheet-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: flex-end;
}

.sheet-overlay.open { display: flex; }

.sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: var(--safe-bottom);
  animation: slideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.sheet-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 0;
}

.sheet-header {
  padding: 16px 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.sheet-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 16px;
  color: var(--accent);
  letter-spacing: 0.06em;
}

.sheet-close {
  background: var(--surface2);
  border: none;
  color: var(--muted);
  width: 30px;
  height: 30px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.sheet-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

.form-group { display: flex; flex-direction: column; gap: 6px; }

label {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
}

input[type="text"], textarea, select.field {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: 12px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  outline: none;
  width: 100%;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}

input[type="text"]:focus, textarea:focus, select.field:focus { border-color: var(--accent); }
input[type="text"]::placeholder, textarea::placeholder { color: var(--muted); }

textarea { resize: none; min-height: 90px; line-height: 1.6; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.stars-input {
  display: flex;
  gap: 10px;
  padding: 4px 0;
}

.star {
  font-size: 26px;
  color: var(--border);
  cursor: pointer;
  transition: color 0.1s;
  line-height: 1;
}

.star.on { color: var(--accent); }

.trust-btns {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

.trust-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  padding: 10px 6px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.trust-btn .trust-dot-big {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.trust-btn.sel-High { background: rgba(46,204,113,0.1); border-color: var(--success); color: var(--success); }
.trust-btn.sel-Medium { background: rgba(230,126,34,0.1); border-color: var(--warning); color: var(--warning); }
.trust-btn.sel-Low { background: rgba(192,57,43,0.1); border-color: var(--danger); color: var(--danger); }

.save-btn {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.1em;
  cursor: pointer;
  width: 100%;
  margin-top: 4px;
  transition: background 0.15s;
}

.save-btn:active { background: var(--accent2); }

/* DETAIL SHEET */
.detail-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.detail-field:last-child { border-bottom: none; }
.detail-label { font-size: 10px; letter-spacing: 0.1em; color: var(--muted); font-family: 'Syne', sans-serif; }
.detail-val { font-size: 13px; color: var(--text); line-height: 1.6; }

.detail-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}

.detail-btn {
  border-radius: 10px;
  padding: 12px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.08em;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s;
}

.detail-btn:active { opacity: 0.7; }
.detail-btn.edit { background: var(--accent); color: #000; }
.detail-btn.del { background: var(--surface2); color: var(--danger); border: 1px solid var(--danger); }

/* SORT BAR */
.sort-bar {
  display: flex;
  gap: 6px;
  padding: 8px 20px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  align-items: center;
}

.sort-bar::-webkit-scrollbar { display: none; }

.sort-label { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; white-space: nowrap; margin-right: 4px; }

.sort-chip {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  transition: all 0.15s;
}

.sort-chip.active { border-color: var(--accent); color: var(--accent); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* PIN LOCK */
#pin-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  padding-top: calc(40px + var(--safe-top));
  padding-bottom: calc(40px + var(--safe-bottom));
}

.pin-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: 0.14em;
  color: var(--accent);
  margin-bottom: 6px;
}

.pin-logo span { color: var(--text); }

.pin-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-bottom: 48px;
}

.pin-dots {
  display: flex;
  gap: 16px;
  margin-bottom: 48px;
}

.pin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  transition: all 0.15s;
}

.pin-dot.filled {
  background: var(--accent);
  border-color: var(--accent);
}

.pin-dot.error {
  background: var(--danger);
  border-color: var(--danger);
  animation: shake 0.3s ease;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.pin-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  width: 100%;
  max-width: 280px;
}

.pin-key {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 72px;
  height: 72px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 22px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  transition: background 0.1s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.pin-key:active {
  background: var(--surface2);
  transform: scale(0.93);
  border-color: var(--accent);
}

.pin-key.del {
  font-size: 18px;
  color: var(--muted);
  background: transparent;
  border-color: transparent;
}

.pin-key.del:active {
  color: var(--accent);
  background: transparent;
  transform: scale(0.93);
}

.pin-key.empty {
  background: transparent;
  border-color: transparent;
  pointer-events: none;
}

.pin-error-msg {
  margin-top: 24px;
  font-size: 12px;
  color: var(--danger);
  letter-spacing: 0.06em;
  height: 18px;
  transition: opacity 0.2s;
}
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="header-top">
      <div class="logo">VALORIA<span>INTEL</span></div>
      <div class="header-pills">
        <div class="pill"><span id="stat-total">0</span> FAC</div>
        <div class="pill"><span id="stat-trust">0</span> ★★★</div>
      </div>
    </div>
    <div class="search-bar">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search supplier, city, product...">
    </div>
  </header>

  <div class="filter-row" id="niche-filters">
    <button class="chip active" data-niche="">All</button>
  </div>

  <div class="sort-bar">
    <span class="sort-label">SORT:</span>
    <button class="sort-chip active" data-sort="added">Recent</button>
    <button class="sort-chip" data-sort="name">Name</button>
    <button class="sort-chip" data-sort="quality">Quality</button>
    <button class="sort-chip" data-sort="trust">Trust</button>
    <button class="sort-chip" data-sort="niche">Niche</button>
  </div>

  <div id="list"></div>
</div>

<button id="fab">+</button>

<!-- ADD / EDIT SHEET -->
<div class="sheet-overlay" id="form-sheet">
  <div class="sheet" id="form-sheet-inner">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="form-title">NEW SUPPLIER</div>
      <button class="sheet-close" onclick="closeForm()">✕</button>
    </div>
    <div class="sheet-body">
      <div class="form-row">
        <div class="form-group">
          <label>SUPPLIER NAME *</label>
          <input type="text" id="f-name" placeholder="Name">
        </div>
        <div class="form-group">
          <label>CITY</label>
          <input type="text" id="f-city" placeholder="City">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>NICHE *</label>
          <input type="text" id="f-niche" placeholder="e.g. Textiles">
        </div>
        <div class="form-group">
          <label>PRODUCTS</label>
          <input type="text" id="f-products" placeholder="e.g. Hoodies">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>CONTACT NAME</label>
          <input type="text" id="f-contact" placeholder="Name">
        </div>
        <div class="form-group">
          <label>WECHAT / PHONE</label>
          <input type="text" id="f-wechat" placeholder="WeChat ID">
        </div>
      </div>
      <div class="form-group">
        <label>EMAIL</label>
        <input type="text" id="f-email" placeholder="email@supplier.com">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>MOQ</label>
          <input type="text" id="f-moq" placeholder="e.g. 500 units">
        </div>
        <div class="form-group">
          <label>LEAD TIME</label>
          <input type="text" id="f-lead" placeholder="e.g. 30 days">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>PRICE RANGE</label>
          <input type="text" id="f-price" placeholder="e.g. $3–$8">
        </div>
        <div class="form-group">
          <label>DATE VISITED</label>
          <input type="text" id="f-date" placeholder="e.g. Apr 10">
        </div>
      </div>
      <div class="form-group">
        <label>SAMPLE?</label>
        <select class="field" id="f-sample">
          <option value="Yes">Yes — have sample</option>
          <option value="On request">On request</option>
          <option value="No">No</option>
        </select>
      </div>
      <div class="form-group">
        <label>TRUST LEVEL</label>
        <div class="trust-btns">
          <button class="trust-btn" data-trust="High" onclick="setTrust('High')">
            <span class="trust-dot-big" style="background:var(--success)"></span>High
          </button>
          <button class="trust-btn" data-trust="Medium" onclick="setTrust('Medium')">
            <span class="trust-dot-big" style="background:var(--warning)"></span>Medium
          </button>
          <button class="trust-btn" data-trust="Low" onclick="setTrust('Low')">
            <span class="trust-dot-big" style="background:var(--danger)"></span>Low
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>QUALITY RATING</label>
        <div class="stars-input" id="stars">
          <span class="star" data-v="1">★</span>
          <span class="star" data-v="2">★</span>
          <span class="star" data-v="3">★</span>
          <span class="star" data-v="4">★</span>
          <span class="star" data-v="5">★</span>
        </div>
      </div>
      <div class="form-group">
        <label>NOTES / IMPRESSIONS</label>
        <textarea id="f-notes" placeholder="Supplier size, vibe, communication quality, red flags, gut feeling..."></textarea>
      </div>
      <button class="save-btn" onclick="saveFactory()">SAVE SUPPLIER</button>
    </div>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="sheet-overlay" id="detail-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="detail-name">—</div>
      <button class="sheet-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="sheet-body" id="detail-body"></div>
    <div class="detail-actions">
      <button class="detail-btn edit" id="detail-edit">EDIT</button>
      <button class="detail-btn del" id="detail-del">DELETE</button>
    </div>
  </div>
</div>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">VALORIA<span>INTEL</span></div>
  <div class="pin-sub">ENTER PIN TO CONTINUE</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-key" onclick="pinKey('1')">1</button>
    <button class="pin-key" onclick="pinKey('2')">2</button>
    <button class="pin-key" onclick="pinKey('3')">3</button>
    <button class="pin-key" onclick="pinKey('4')">4</button>
    <button class="pin-key" onclick="pinKey('5')">5</button>
    <button class="pin-key" onclick="pinKey('6')">6</button>
    <button class="pin-key" onclick="pinKey('7')">7</button>
    <button class="pin-key" onclick="pinKey('8')">8</button>
    <button class="pin-key" onclick="pinKey('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinKey('0')">0</button>
    <button class="pin-key del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-error-msg" id="pin-error"></div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// PIN LOGIC
const CORRECT_PIN = '2005';
let pinEntry = '';
let pinLocked = false;

function pinKey(digit) {
  if (pinLocked || pinEntry.length >= CORRECT_PIN.length) return;
  pinEntry += digit;
  updateDots();
  if (pinEntry.length === CORRECT_PIN.length) setTimeout(checkPin, 120);
}

function pinDel() {
  if (pinLocked) return;
  pinEntry = pinEntry.slice(0, -1);
  updateDots();
  document.getElementById('pin-error').textContent = '';
}

function updateDots() {
  for (let i = 0; i < CORRECT_PIN.length; i++) {
    const dot = document.getElementById('d' + i);
    dot.classList.toggle('filled', i < pinEntry.length);
    dot.classList.remove('error');
  }
}

function checkPin() {
  if (pinEntry === CORRECT_PIN) {
    const ps = document.getElementById('pin-screen');
    ps.style.transition = 'opacity 0.3s';
    ps.style.opacity = '0';
    setTimeout(() => { ps.style.display = 'none'; }, 300);
  } else {
    pinLocked = true;
    for (let i = 0; i < CORRECT_PIN.length; i++) document.getElementById('d' + i).classList.add('error');
    document.getElementById('pin-error').textContent = 'WRONG PIN — TRY AGAIN';
    setTimeout(() => {
      pinEntry = '';
      pinLocked = false;
      updateDots();
      document.getElementById('pin-error').textContent = '';
    }, 900);
  }
}

let factories = JSON.parse(localStorage.getItem('vi_factories') || '[]');
let editingId = null;
let qualityRating = 3;
let trustVal = 'High';
let activeNiche = '';
let activeSort = 'added';
let sortAsc = false;
let detailId = null;

const save = () => { localStorage.setItem('vi_factories', JSON.stringify(factories)); render(); };
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const stars = n => '★'.repeat(n||0) + '☆'.repeat(5-(n||0));
const trustColor = t => ({ High: 'var(--success)', Medium: 'var(--warning)', Low: 'var(--danger)' })[t] || 'var(--muted)';

function setTrust(t) {
  trustVal = t;
  document.querySelectorAll('.trust-btn').forEach(b => {
    b.className = 'trust-btn' + (b.dataset.trust === t ? ' sel-' + t : '');
  });
}

function setStars(n) {
  qualityRating = n;
  document.querySelectorAll('.star').forEach(s => s.classList.toggle('on', +s.dataset.v <= n));
}

document.getElementById('stars').addEventListener('click', e => {
  if (e.target.classList.contains('star')) setStars(+e.target.dataset.v);
});

function openForm(id) {
  editingId = id || null;
  document.getElementById('form-title').textContent = id ? 'EDIT SUPPLIER' : 'NEW SUPPLIER';
  const f = id ? factories.find(x => x.id === id) : {};
  ['name','city','niche','products','contact','wechat','email','moq','lead','price','date','notes'].forEach(k => {
    document.getElementById('f-'+k).value = f[k] || '';
  });
  document.getElementById('f-sample').value = f.sample || 'Yes';
  setTrust(f.trust || 'High');
  setStars(f.quality || 3);
  closeDetail();
  document.getElementById('form-sheet').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 300);
}

function closeForm() { document.getElementById('form-sheet').classList.remove('open'); }

function saveFactory() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const data = {
    id: editingId || uid(),
    name,
    city: document.getElementById('f-city').value.trim(),
    niche: document.getElementById('f-niche').value.trim(),
    products: document.getElementById('f-products').value.trim(),
    contact: document.getElementById('f-contact').value.trim(),
    wechat: document.getElementById('f-wechat').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    moq: document.getElementById('f-moq').value.trim(),
    lead: document.getElementById('f-lead').value.trim(),
    price: document.getElementById('f-price').value.trim(),
    date: document.getElementById('f-date').value.trim(),
    sample: document.getElementById('f-sample').value,
    trust: trustVal,
    quality: qualityRating,
    notes: document.getElementById('f-notes').value.trim(),
    added: editingId ? (factories.find(x=>x.id===editingId)?.added || Date.now()) : Date.now()
  };
  factories = editingId ? factories.map(f => f.id === editingId ? data : f) : [data, ...factories];
  closeForm();
  save();
}

function openDetail(id) {
  detailId = id;
  const f = factories.find(x => x.id === id);
  if (!f) return;
  document.getElementById('detail-name').textContent = f.name;
  const fields = [
    ['CITY', f.city],
    ['NICHE', f.niche],
    ['PRODUCTS', f.products],
    ['CONTACT', f.contact],
    ['WECHAT / PHONE', f.wechat],
    ['EMAIL', f.email],
    ['MOQ', f.moq],
    ['LEAD TIME', f.lead],
    ['PRICE RANGE', f.price],
    ['SAMPLE', f.sample],
    ['DATE VISITED', f.date],
    ['TRUST', `<span style="color:${trustColor(f.trust)}">${f.trust||'—'}</span>`],
    ['QUALITY', `<span style="color:var(--accent)">${stars(f.quality)}</span>`],
    ['NOTES', f.notes],
  ].filter(([,v]) => v);

  document.getElementById('detail-body').innerHTML = fields.map(([l,v]) => `
    <div class="detail-field">
      <div class="detail-label">${l}</div>
      <div class="detail-val">${v}</div>
    </div>
  `).join('');

  document.getElementById('detail-edit').onclick = () => openForm(id);
  document.getElementById('detail-del').onclick = () => {
    if (confirm(`Delete ${f.name}?`)) {
      factories = factories.filter(x => x.id !== id);
      closeDetail();
      save();
    }
  };
  document.getElementById('detail-sheet').classList.add('open');
}

function closeDetail() { document.getElementById('detail-sheet').classList.remove('open'); }

// Close sheets on overlay tap
document.querySelectorAll('.sheet-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

document.getElementById('fab').onclick = () => openForm(null);
document.getElementById('search').addEventListener('input', render);

// Niche filter chips
function buildNicheChips() {
  const niches = [...new Set(factories.map(f=>f.niche).filter(Boolean))];
  const container = document.getElementById('niche-filters');
  container.innerHTML = ['', ...niches].map(n => `
    <button class="chip${n===activeNiche?' active':''}" data-niche="${n}">${n||'All'}</button>
  `).join('');
  container.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => { activeNiche = c.dataset.niche; buildNicheChips(); render(); });
  });
}

// Sort chips
document.querySelectorAll('.sort-chip').forEach(c => {
  c.addEventListener('click', () => {
    if (activeSort === c.dataset.sort) { sortAsc = !sortAsc; }
    else { activeSort = c.dataset.sort; sortAsc = false; }
    document.querySelectorAll('.sort-chip').forEach(x => x.classList.toggle('active', x === c));
    render();
  });
});

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  return factories.filter(f => {
    const matchQ = !q || [f.name,f.city,f.niche,f.products,f.contact,f.notes].some(v=>v&&v.toLowerCase().includes(q));
    const matchN = !activeNiche || f.niche === activeNiche;
    return matchQ && matchN;
  });
}

function render() {
  buildNicheChips();
  let list = getFiltered();

  // Sort
  const trustOrder = { High: 0, Medium: 1, Low: 2 };
  list = [...list].sort((a, b) => {
    let av, bv;
    if (activeSort === 'trust') { av = trustOrder[a.trust]??1; bv = trustOrder[b.trust]??1; }
    else if (activeSort === 'quality') { av = -(a.quality||0); bv = -(b.quality||0); }
    else if (activeSort === 'added') { av = -(a.added||0); bv = -(b.added||0); }
    else { av = (a[activeSort]||'').toLowerCase(); bv = (b[activeSort]||'').toLowerCase(); }
    const cmp = typeof av === 'number' ? av - bv : av.localeCompare(bv);
    return sortAsc ? -cmp : cmp;
  });

  document.getElementById('stat-total').textContent = factories.length;
  document.getElementById('stat-trust').textContent = factories.filter(f=>f.trust==='High'&&(f.quality||0)>=4).length;

  const container = document.getElementById('list');

  if (list.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🏭</div>
        <div class="empty-text">${factories.length === 0 ? 'No factories yet.<br>Tap + to add your first contact.' : 'No results found.'}</div>
      </div>`;
    return;
  }

  container.innerHTML = list.map(f => `
    <div class="factory-card" onclick="openDetail('${f.id}')">
      <div class="card-top">
        <div class="card-name">${f.name}</div>
        <div class="card-trust" style="background:${trustColor(f.trust)}"></div>
      </div>
      <div class="card-meta">
        ${f.city ? `<span class="card-city">📍 ${f.city}</span>` : ''}
        ${f.niche ? `<span class="card-niche">${f.niche}</span>` : ''}
      </div>
      <div class="card-bottom">
        <div class="card-stats">
          ${f.moq ? `<div class="card-stat"><div class="stat-label">MOQ</div><div class="stat-val">${f.moq}</div></div>` : ''}
          ${f.lead ? `<div class="card-stat"><div class="stat-label">LEAD</div><div class="stat-val">${f.lead}</div></div>` : ''}
          ${f.contact ? `<div class="card-stat"><div class="stat-label">CONTACT</div><div class="stat-val">${f.contact}</div></div>` : ''}
        </div>
        <div class="card-stars">${stars(f.quality)}</div>
      </div>
    </div>
  `).join('');
}

render();
</script>
</body>
</html>
